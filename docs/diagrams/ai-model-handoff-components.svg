<svg xmlns="http://www.w3.org/2000/svg" width="2300" height="1540" viewBox="0 0 2300 1540" role="img" aria-labelledby="title desc">
  <title id="title">AI Model Handoff Component Diagram</title>
  <desc id="desc">Final v1 component diagram with full option-chain feed, internal ATM plus or minus 10 strike selection, shared processing, and family model handoff.</desc>
  <defs>
    <style>
      .bg { fill: #08131c; }
      .panel { fill: #0d1822; stroke: #21374a; stroke-width: 2; }
      .lane { fill: #0f1f2b; stroke: #2a4a63; stroke-width: 2; stroke-dasharray: 10 8; }
      .title { fill: #e8f3fa; font: 700 36px 'JetBrains Mono', Consolas, monospace; }
      .subtitle { fill: #9cb3c4; font: 500 17px 'JetBrains Mono', Consolas, monospace; }
      .section { fill: #7fd6f4; font: 700 15px 'JetBrains Mono', Consolas, monospace; letter-spacing: 1px; }
      .box-external { fill: #112519; stroke: #44c57a; stroke-width: 3; rx: 18; ry: 18; }
      .box-shared { fill: #132230; stroke: #4f85a6; stroke-width: 3; rx: 18; ry: 18; }
      .box-config { fill: #111f2d; stroke: #8f7cf5; stroke-width: 3; rx: 18; ry: 18; }
      .box-core { fill: #152634; stroke: #72c5e8; stroke-width: 3; rx: 18; ry: 18; }
      .box-model { fill: #241f14; stroke: #d8a94b; stroke-width: 3; rx: 18; ry: 18; }
      .box-note { fill: #1b1624; stroke: #c98af8; stroke-width: 3; rx: 18; ry: 18; }
      .label { fill: #e8f3fa; font: 700 20px 'JetBrains Mono', Consolas, monospace; text-anchor: middle; }
      .small { fill: #9cb3c4; font: 500 13px 'JetBrains Mono', Consolas, monospace; text-anchor: middle; }
      .left-small { fill: #9cb3c4; font: 500 13px 'JetBrains Mono', Consolas, monospace; }
      .arrow { stroke: #7fd6f4; stroke-width: 4; fill: none; marker-end: url(#arrowhead); }
      .arrow-config { stroke: #8f7cf5; stroke-width: 4; fill: none; stroke-dasharray: 10 8; marker-end: url(#arrowheadConfig); }
      .arrow-model { stroke: #d8a94b; stroke-width: 4; fill: none; marker-end: url(#arrowheadModel); }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <polygon points="0 0, 12 6, 0 12" fill="#7fd6f4" />
    </marker>
    <marker id="arrowheadConfig" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <polygon points="0 0, 12 6, 0 12" fill="#8f7cf5" />
    </marker>
    <marker id="arrowheadModel" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <polygon points="0 0, 12 6, 0 12" fill="#d8a94b" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="2300" height="1540" />
  <rect class="panel" x="30" y="30" width="2240" height="1480" rx="28" ry="28" />

  <text class="title" x="70" y="94">AI Model Handoff Component Diagram</text>
  <text class="subtitle" x="70" y="126">Final v1 with live underlying ticks, full option-chain feed, internal ATM +/- 10 strike selection, generic processing, and direct family-model handoff.</text>

  <text class="section" x="90" y="188">SHARED INGESTION</text>

  <rect class="box-external" x="80" y="215" width="230" height="82" rx="18" ry="18" />
  <text class="label" x="195" y="249">Underlying Feed</text>
  <text class="small" x="195" y="272">live ticks for enabled underlyings</text>

  <rect class="box-external" x="80" y="335" width="230" height="82" rx="18" ry="18" />
  <text class="label" x="195" y="369">Option Chain Feed</text>
  <text class="small" x="195" y="392">full chain snapshot from broker service</text>

  <rect class="box-shared" x="370" y="215" width="260" height="82" rx="18" ry="18" />
  <text class="label" x="500" y="245">TickNormalizer</text>
  <text class="small" x="500" y="268">normalize underlying tick into TickEvent</text>

  <rect class="box-shared" x="370" y="335" width="260" height="82" rx="18" ry="18" />
  <text class="label" x="500" y="365">OptionChainNormalizer</text>
  <text class="small" x="500" y="388">normalize full chain into option snapshot</text>

  <path class="arrow" d="M310 256 L370 256" />
  <path class="arrow" d="M310 376 L370 376" />

  <text class="section" x="90" y="480">CONFIG FILE</text>

  <rect class="lane" x="80" y="505" width="520" height="590" rx="26" ry="26" />
  <text class="label" x="340" y="542">Config Loader</text>
  <text class="small" x="340" y="566">resolved once at startup or reload</text>

  <rect class="box-config" x="135" y="625" width="410" height="86" rx="18" ry="18" />
  <text class="label" x="340" y="657">Global Defaults</text>
  <text class="small" x="340" y="680">bar_interval, warmup_bars, stale_after_sec</text>

  <rect class="box-config" x="135" y="775" width="410" height="86" rx="18" ry="18" />
  <text class="label" x="340" y="807">Family Defaults</text>
  <text class="small" x="340" y="830">model_key, options_enabled, strike_window</text>

  <rect class="box-config" x="135" y="925" width="410" height="86" rx="18" ry="18" />
  <text class="label" x="340" y="957">Instrument Overrides</text>
  <text class="small" x="340" y="980">highest precedence for each symbol</text>

  <rect class="box-note" x="135" y="1035" width="410" height="50" rx="18" ry="18" />
  <text class="small" x="340" y="1066">effective = global + family + instrument</text>

  <path class="arrow-config" d="M340 711 L340 775" />
  <path class="arrow-config" d="M340 861 L340 925" />
  <path class="arrow-config" d="M340 1011 L340 1035" />

  <text class="section" x="670" y="188">GENERIC PROCESSOR</text>

  <rect class="lane" x="650" y="215" width="840" height="1180" rx="26" ry="26" />
  <text class="label" x="1070" y="252">InstrumentProcessor</text>
  <text class="small" x="1070" y="276">same code path for every instrument, with config deciding family and options behavior</text>

  <rect class="box-core" x="735" y="340" width="670" height="86" rx="18" ry="18" />
  <text class="label" x="1070" y="372">Underlying State And Bars</text>
  <text class="small" x="1070" y="395">latest tick state and bars using configured interval</text>

  <rect class="box-core" x="735" y="470" width="670" height="100" rx="18" ry="18" />
  <text class="label" x="1070" y="503">Option State</text>
  <text class="small" x="1070" y="526">store full option chain snapshot from broker service</text>
  <text class="small" x="1070" y="546">underlying, expiry, spotPrice, rows[] with OI, OI change, LTP, volume, IV</text>

  <rect class="box-core" x="735" y="620" width="670" height="100" rx="18" ry="18" />
  <text class="label" x="1070" y="653">ATM Window Selector</text>
  <text class="small" x="1070" y="676">find ATM from spot price and derive ATM +/- 10 strikes internally</text>
  <text class="small" x="1070" y="696">the broker returns full chain; the system slices the working window</text>

  <rect class="box-core" x="735" y="770" width="670" height="140" rx="18" ry="18" />
  <text class="label" x="1070" y="804">FeatureEngine</text>
  <text class="small" x="1070" y="828">price features: RSI 14, EMA 9, EMA 21, VWAP, candle body, bracket high/low,</text>
  <text class="small" x="1070" y="848">trend, volume spike, volume trend</text>
  <text class="small" x="1070" y="868">options features: OI change, PCR, call/put buildup from ATM +/- 10 window</text>

  <rect class="box-core" x="735" y="960" width="670" height="90" rx="18" ry="18" />
  <text class="label" x="1070" y="993">Basic Checks</text>
  <text class="small" x="1070" y="1016">warmup complete, stale data, missing values, simple spread guard</text>

  <rect class="box-core" x="735" y="1100" width="670" height="120" rx="18" ry="18" />
  <text class="label" x="1070" y="1134">Prediction Payload</text>
  <text class="small" x="1070" y="1158">instrument_id, family, model_key, timestamp, price features, options features</text>
  <text class="small" x="1070" y="1178">built only when decision bar closes and checks pass</text>

  <path class="arrow" d="M630 256 L700 256 L700 383 L735 383" />
  <path class="arrow" d="M630 376 L690 376 L690 520 L735 520" />
  <path class="arrow" d="M1070 426 L1070 470" />
  <path class="arrow" d="M1070 570 L1070 620" />
  <path class="arrow" d="M1070 720 L1070 770" />
  <path class="arrow" d="M1070 910 L1070 960" />
  <path class="arrow" d="M1070 1050 L1070 1100" />
  <path class="arrow-config" d="M545 1060 L620 1060 L620 665 L735 665" />

  <text class="section" x="1560" y="188">MODEL HANDOFF</text>

  <rect class="lane" x="1540" y="215" width="670" height="1180" rx="26" ry="26" />
  <text class="label" x="1875" y="252">Family Models</text>
  <text class="small" x="1875" y="276">payload.model_key chooses the destination model</text>

  <rect class="box-model" x="1650" y="540" width="450" height="84" rx="18" ry="18" />
  <text class="label" x="1875" y="572">Index Model</text>
  <text class="small" x="1875" y="596">Nifty, BankNifty</text>

  <rect class="box-model" x="1650" y="740" width="450" height="84" rx="18" ry="18" />
  <text class="label" x="1875" y="772">Commodity Model</text>
  <text class="small" x="1875" y="796">CrudeOil, Natural Gas</text>

  <rect class="box-model" x="1650" y="940" width="450" height="84" rx="18" ry="18" />
  <text class="label" x="1875" y="972">Equity Model</text>
  <text class="small" x="1875" y="996">Netweb, E2E, Tata Motors</text>

  <rect class="box-note" x="1610" y="1125" width="530" height="96" rx="18" ry="18" />
  <text class="label" x="1875" y="1158">Model Handoff Boundary</text>
  <text class="small" x="1875" y="1182">payload leaves the pre-model pipeline here</text>
  <text class="small" x="1875" y="1202">next stage is inference, post-model filters, and executor handoff</text>

  <path class="arrow-model" d="M1405 1160 L1540 1160 L1540 582 L1650 582" />
  <path class="arrow-model" d="M1405 1160 L1570 1160 L1570 782 L1650 782" />
  <path class="arrow-model" d="M1405 1160 L1570 1160 L1570 982 L1650 982" />

  <text class="left-small" x="80" y="1440">Broker service returns the full normalized option chain. The system derives ATM +/- 10 strikes internally before computing options features.</text>
  <text class="left-small" x="80" y="1463">Minimal v1 still avoids replay store and metrics, while keeping options data as a first-class input to the model payload.</text>
</svg>
