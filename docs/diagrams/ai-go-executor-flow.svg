<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="2920" viewBox="0 0 1600 2920" role="img" aria-labelledby="title desc">
  <title id="title">AI GO to Executor Position Lifecycle</title>
  <desc id="desc">Flow diagram showing how an AI GO signal moves through the execution module, live or paper entry, dashboard position updates, monitoring, and exits.</desc>
  <defs>
    <style>
      .bg { fill: #071018; }
      .panel { fill: #0c1720; stroke: #1f3442; stroke-width: 1; }
      .title { fill: #e6f1f7; font: 700 34px 'JetBrains Mono', Consolas, monospace; }
      .subtitle { fill: #8aa4b5; font: 500 16px 'JetBrains Mono', Consolas, monospace; }
      .box { fill: #0f1d27; stroke: #2b5568; stroke-width: 2; rx: 18; ry: 18; }
      .decision { fill: #171d26; stroke: #d1a33c; stroke-width: 2; }
      .stop { fill: #241216; stroke: #d45c6d; stroke-width: 2; rx: 16; ry: 16; }
      .action { fill: #0f1d27; stroke: #2b5568; stroke-width: 2; rx: 18; ry: 18; }
      .success { fill: #0d2018; stroke: #31c48d; stroke-width: 2; rx: 18; ry: 18; }
      .io { fill: #111929; stroke: #4f6ddf; stroke-width: 2; rx: 18; ry: 18; }
      .label { fill: #d9e8f0; font: 700 16px 'JetBrains Mono', Consolas, monospace; text-anchor: middle; }
      .small { fill: #8aa4b5; font: 500 12px 'JetBrains Mono', Consolas, monospace; text-anchor: middle; }
      .branch { fill: #f4d58d; font: 700 13px 'JetBrains Mono', Consolas, monospace; }
      .arrow { stroke: #77d3f2; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .arrow-stop { stroke: #d45c6d; stroke-width: 3; fill: none; marker-end: url(#arrowheadStop); }
      .arrow-ok { stroke: #31c48d; stroke-width: 3; fill: none; marker-end: url(#arrowheadOk); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#77d3f2" />
    </marker>
    <marker id="arrowheadStop" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#d45c6d" />
    </marker>
    <marker id="arrowheadOk" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#31c48d" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="2920" />
  <rect class="panel" x="30" y="30" width="1540" height="2860" rx="28" ry="28" />

  <text class="title" x="80" y="105">AI GO -&gt; Executor Position Lifecycle</text>
  <text class="subtitle" x="80" y="138">Downloadable flow showing how GO_CALL / GO_PUT becomes a tracked live or paper position.</text>

  <!-- Main flow -->
  <rect class="io" x="620" y="180" width="360" height="76" rx="18" ry="18" />
  <text class="label" x="800" y="214">AI engine saves decision JSON</text>
  <text class="small" x="800" y="238">trade_direction = GO_CALL / GO_PUT</text>

  <rect class="io" x="620" y="310" width="360" height="76" rx="18" ry="18" />
  <text class="label" x="800" y="344">Execution module reads file</text>
  <text class="small" x="800" y="368">main loop polls latest AI decision</text>

  <polygon class="decision" points="800,430 940,500 800,570 660,500" />
  <text class="label" x="800" y="495">Valid GO signal?</text>
  <text class="small" x="800" y="517">GO_CALL / GO_PUT only</text>

  <rect class="action" x="620" y="620" width="360" height="88" rx="18" ry="18" />
  <text class="label" x="800" y="655">parse_ai_decision()</text>
  <text class="small" x="800" y="680">extract strike, option type, entry,</text>
  <text class="small" x="800" y="698">target, stop loss, confidence, R:R</text>

  <polygon class="decision" points="800,760 950,835 800,910 650,835" />
  <text class="label" x="800" y="830">Already open position</text>
  <text class="small" x="800" y="852">for this instrument?</text>

  <polygon class="decision" points="800,965 945,1040 800,1115 655,1040" />
  <text class="label" x="800" y="1035">Timing confirmation</text>
  <text class="small" x="800" y="1057">needed first?</text>

  <rect class="action" x="620" y="1165" width="360" height="88" rx="18" ry="18" />
  <text class="label" x="800" y="1200">Get real entry price</text>
  <text class="small" x="800" y="1225">trade_setup price or current</text>
  <text class="small" x="800" y="1243">option-chain price</text>

  <rect class="action" x="620" y="1310" width="360" height="88" rx="18" ry="18" />
  <text class="label" x="800" y="1345">discipline.validate</text>
  <text class="small" x="800" y="1370">pre-trade check with confidence,</text>
  <text class="small" x="800" y="1388">R:R, capital, exposure</text>

  <polygon class="decision" points="800,1450 930,1520 800,1590 670,1520" />
  <text class="label" x="800" y="1515">Trade allowed?</text>

  <polygon class="decision" points="800,1640 920,1710 800,1780 680,1710" />
  <text class="label" x="800" y="1705">LIVE_TRADING?</text>

  <!-- Live branch -->
  <rect class="action" x="210" y="1668" width="330" height="92" rx="18" ry="18" />
  <text class="label" x="375" y="1702">Resolve security ID</text>
  <text class="small" x="375" y="1726">and place BUY order via</text>
  <text class="small" x="375" y="1744">Broker Service</text>

  <polygon class="decision" points="375,1808 500,1878 375,1948 250,1878" transform="translate(0,-120)" />
  <text class="label" x="375" y="1763">Order accepted?</text>

  <!-- Paper branch -->
  <rect class="success" x="1060" y="1668" width="330" height="92" rx="18" ry="18" />
  <text class="label" x="1225" y="1702">Simulated paper entry</text>
  <text class="small" x="1225" y="1726">no broker order, position is</text>
  <text class="small" x="1225" y="1744">created in executor memory</text>

  <!-- Converged position flow -->
  <rect class="success" x="620" y="1810" width="360" height="92" rx="18" ry="18" />
  <text class="label" x="800" y="1844">Create OPEN position</text>
  <text class="small" x="800" y="1868">store in OPEN_POSITIONS</text>
  <text class="small" x="800" y="1886">with SL, TP, qty, timestamps</text>

  <rect class="success" x="620" y="1955" width="360" height="76" rx="18" ry="18" />
  <text class="label" x="800" y="1989">Notify discipline.onTradePlaced</text>
  <text class="small" x="800" y="2013">increments trade counters</text>

  <rect class="io" x="620" y="2080" width="360" height="76" rx="18" ry="18" />
  <text class="label" x="800" y="2114">Push OPEN position to dashboard</text>
  <text class="small" x="800" y="2138">POST /api/trading/position</text>

  <rect class="io" x="620" y="2205" width="360" height="76" rx="18" ry="18" />
  <text class="label" x="800" y="2239">Dashboard shows AI position</text>
  <text class="small" x="800" y="2263">open row with live P&amp;L updates</text>

  <rect class="action" x="620" y="2330" width="360" height="88" rx="18" ry="18" />
  <text class="label" x="800" y="2365">monitor_positions()</text>
  <text class="small" x="800" y="2390">refresh current price, pnl, momentum,</text>
  <text class="small" x="800" y="2408">risk manager, age, adaptive exits</text>

  <polygon class="decision" points="800,2465 930,2535 800,2605 670,2535" />
  <text class="label" x="800" y="2530">Exit rule hit?</text>

  <rect class="action" x="180" y="2490" width="340" height="84" rx="18" ry="18" />
  <text class="label" x="350" y="2524">execute_partial_exit()</text>
  <text class="small" x="350" y="2548">partial sell in live, simulated</text>
  <text class="small" x="350" y="2566">reduction in paper mode</text>

  <rect class="action" x="1080" y="2490" width="340" height="84" rx="18" ry="18" />
  <text class="label" x="1250" y="2524">execute_full_exit()</text>
  <text class="small" x="1250" y="2548">close broker position in live,</text>
  <text class="small" x="1250" y="2566">simulated close in paper mode</text>

  <rect class="io" x="180" y="2635" width="340" height="76" rx="18" ry="18" />
  <text class="label" x="350" y="2669">Push updated OPEN position</text>
  <text class="small" x="350" y="2693">dashboard reflects partial exit</text>

  <rect class="success" x="1080" y="2635" width="340" height="76" rx="18" ry="18" />
  <text class="label" x="1250" y="2669">discipline.onTradeClosed</text>
  <text class="small" x="1250" y="2693">cooldowns, streaks, circuit breaker</text>

  <rect class="io" x="1080" y="2760" width="340" height="76" rx="18" ry="18" />
  <text class="label" x="1250" y="2794">Push CLOSED position</text>
  <text class="small" x="1250" y="2818">dashboard shows final pnl and status</text>

  <!-- Stop / no trade nodes -->
  <rect class="stop" x="1110" y="468" width="250" height="64" rx="16" ry="16" />
  <text class="label" x="1235" y="505">No trade</text>

  <rect class="stop" x="1110" y="803" width="250" height="64" rx="16" ry="16" />
  <text class="label" x="1235" y="840">Skip new entry</text>

  <rect class="stop" x="1110" y="1010" width="250" height="64" rx="16" ry="16" />
  <text class="label" x="1235" y="1047">Queue as pending</text>

  <rect class="stop" x="1110" y="1488" width="250" height="64" rx="16" ry="16" />
  <text class="label" x="1235" y="1525">Trade blocked</text>

  <rect class="stop" x="150" y="1760" width="200" height="64" rx="16" ry="16" />
  <text class="label" x="250" y="1797">Stop entry</text>

  <!-- Connectors -->
  <path class="arrow" d="M800 256 L800 310" />
  <path class="arrow" d="M800 386 L800 430" />
  <path class="arrow-stop" d="M940 500 L1110 500" />
  <text class="branch" x="960" y="486">No</text>
  <path class="arrow-ok" d="M800 570 L800 620" />
  <text class="branch" x="812" y="603">Yes</text>

  <path class="arrow" d="M800 708 L800 760" />
  <path class="arrow-stop" d="M950 835 L1110 835" />
  <text class="branch" x="965" y="821">Yes</text>
  <path class="arrow-ok" d="M800 910 L800 965" />
  <text class="branch" x="812" y="943">No</text>

  <path class="arrow-stop" d="M945 1040 L1110 1040" />
  <text class="branch" x="960" y="1026">Yes</text>
  <path class="arrow-ok" d="M800 1115 L800 1165" />
  <text class="branch" x="812" y="1148">No / confirmed</text>

  <path class="arrow" d="M800 1253 L800 1310" />
  <path class="arrow" d="M800 1398 L800 1450" />
  <path class="arrow-stop" d="M930 1520 L1110 1520" />
  <text class="branch" x="946" y="1506">No</text>
  <path class="arrow-ok" d="M800 1590 L800 1640" />
  <text class="branch" x="812" y="1623">Yes</text>

  <!-- Live / paper split -->
  <path class="arrow-ok" d="M680 1710 L540 1710" />
  <text class="branch" x="625" y="1696">Yes</text>
  <path class="arrow-ok" d="M920 1710 L1060 1710" />
  <text class="branch" x="936" y="1696">No</text>

  <path class="arrow" d="M375 1760 L375 1808" />
  <path class="arrow-stop" d="M500 1758 L500 1792 L350 1792" />
  <text class="branch" x="470" y="1778">No</text>
  <path class="arrow-ok" d="M375 1828 L375 1856 L620 1856" />
  <text class="branch" x="400" y="1846">Yes</text>
  <path class="arrow-ok" d="M1060 1714 L980 1714 L980 1856" />

  <path class="arrow" d="M800 1902 L800 1955" />
  <path class="arrow" d="M800 2031 L800 2080" />
  <path class="arrow" d="M800 2156 L800 2205" />
  <path class="arrow" d="M800 2281 L800 2330" />
  <path class="arrow" d="M800 2418 L800 2465" />

  <!-- Exit branches -->
  <path class="arrow-ok" d="M670 2535 L520 2535" />
  <text class="branch" x="590" y="2521">Partial</text>
  <path class="arrow-ok" d="M930 2535 L1080 2535" />
  <text class="branch" x="944" y="2521">Full</text>
  <path class="arrow" d="M800 2605 L800 2670 L800 2670" opacity="0" />
  <path class="arrow" d="M800 2605 L800 2680" />
  <text class="branch" x="812" y="2648">No</text>

  <rect class="action" x="620" y="2642" width="360" height="76" rx="18" ry="18" />
  <text class="label" x="800" y="2676">Keep monitoring open position</text>
  <text class="small" x="800" y="2700">loop continues until an exit fires</text>
  <path class="arrow" d="M800 2718 L800 2330" />

  <path class="arrow" d="M350 2574 L350 2635" />
  <path class="arrow" d="M1250 2574 L1250 2635" />
  <path class="arrow" d="M1250 2711 L1250 2760" />

  <!-- Footer -->
  <text class="subtitle" x="80" y="2860">Generated from current code flow in python_modules/execution_module.py and server/dashboard integration.</text>
</svg>
