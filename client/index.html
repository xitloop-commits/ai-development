<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Lucky Basker — lubas</title>
    <!-- Apply the persisted theme BEFORE first paint so the default (dark) never
         flashes. Dark is default; 'light' opts out of .dark; 'slate' is a
         dark-family theme selected via data-theme. -->
    <script>
      (function () {
        var el = document.documentElement;
        try {
          var t = localStorage.getItem('theme');
          if (t === 'light') return;
          el.classList.add('dark');
          if (t === 'slate') el.setAttribute('data-theme', 'slate');
        } catch (e) {
          el.classList.add('dark');
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>

</html>
